name: Run unit tests
on:
  pull_request_target:
    types: [ opened, synchronize, reopened, closed ]
    branches:
      - master
      - develop

jobs:
  tests:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: hackgreenville
          MYSQL_USER: hackgreenville
          MYSQL_ROOT_PASSWORD: test
          MYSQL_PASSWORD: test
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }} # Important: test the actual PR code
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.1
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, mysql, mysqli, pdo_mysql, bcmath, soap, intl, gd, exif, iconv
      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader
      - name: Install Node dependencies
        run: yarn install --frozen-lockfile
      - name: Copy environment variables to .env
        run: cp .env.ci .env
      - name: Generate application key
        run: php artisan key:generate
      - name: Migrate database
        run: php artisan migrate --seed
      - name: Build website
        run: yarn build
      - name: Run tests
        run: php artisan test

  pr_opened:
    if: github.event.action == 'opened'
    runs-on: ubuntu-latest
    needs: tests # Only create environment if tests pass
    environment: staging
    container: ghcr.io/railwayapp/cli:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          
      - name: Link to project
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: railway link ${{ secrets.RAILWAY_PROJECT_ID }} --environment ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
        
      - name: Create Railway Environment for PR
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: railway environment create pr-${{ github.event.pull_request.number }} --copy ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
        
      - name: Deploy to new PR environment
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          railway link ${{ secrets.RAILWAY_PROJECT_ID }} --environment pr-${{ github.event.pull_request.number }}
          railway up --detach
          
      - name: Get deployment URL
        id: get_url
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          railway link ${{ secrets.RAILWAY_PROJECT_ID }} --environment pr-${{ github.event.pull_request.number }}
          # Wait for deployment to be ready
          sleep 30
          # Get the deployment URL
          URL=$(railway domain | grep -oE 'https://[^ ]+' | head -1)
          echo "deployment_url=$URL" >> $GITHUB_OUTPUT
          
      - name: Comment PR with deployment URL
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const url = '${{ steps.get_url.outputs.deployment_url }}';
            const body = `🚀 **Preview Environment Ready!**
            
            Your PR has been deployed to: ${url || 'URL pending... (check back in a moment)'}
            
            This environment will be automatically updated when you push new commits.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  pr_updated:
    if: github.event.action == 'synchronize'
    runs-on: ubuntu-latest
    needs: tests # Only deploy if tests pass
    environment: staging
    container: ghcr.io/railwayapp/cli:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
        
      - name: Check if environment exists
        id: check_env
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          railway link ${{ secrets.RAILWAY_PROJECT_ID }}
          if railway environment list | grep -q "pr-${{ github.event.pull_request.number }}"; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        
      - name: Create environment if it doesn't exist
        if: steps.check_env.outputs.exists == 'false'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          railway link ${{ secrets.RAILWAY_PROJECT_ID }} --environment ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
          railway environment create pr-${{ github.event.pull_request.number }} --copy ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
        
      - name: Deploy to Railway Environment
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          railway link ${{ secrets.RAILWAY_PROJECT_ID }} --environment pr-${{ github.event.pull_request.number }}
          railway up --detach
          
      - name: Get deployment URL
        id: get_url
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          railway link ${{ secrets.RAILWAY_PROJECT_ID }} --environment pr-${{ github.event.pull_request.number }}
          # Wait for deployment to be ready
          sleep 30
          # Get the deployment URL
          URL=$(railway domain | grep -oE 'https://[^ ]+' | head -1)
          echo "deployment_url=$URL" >> $GITHUB_OUTPUT
          
      - name: Comment PR with update status
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const url = '${{ steps.get_url.outputs.deployment_url }}';
            const wasCreated = '${{ steps.check_env.outputs.exists }}' === 'false';
            
            const body = wasCreated 
              ? `🚀 **Preview Environment Created!**
              
              The PR environment didn't exist, so I created it for you.
              Your PR has been deployed to: ${url || 'URL pending... (check back in a moment)'}`
              : `🔄 **Preview Environment Updated!**
              
              Your latest changes have been deployed to: ${url || 'URL pending... (check back in a moment)'}`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  pr_closed:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    environment: staging
    container: ghcr.io/railwayapp/cli:latest
    steps:
      - name: Link to project
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: railway link ${{ secrets.RAILWAY_PROJECT_ID }} --environment ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
        
      - name: Delete Railway Environment for PR
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: railway environment delete pr-${{ github.event.pull_request.number }} --yes || true
        
      - name: Comment PR about environment deletion
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🧹 **Preview environment has been deleted.**
